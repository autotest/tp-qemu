# The following testing scenario covers:
#   Basic block mirror test with fio test and pausing the VM immediately

#   The mirror image is a local image(filesystem)

- blockdev_mirror_pause_and_compare:
    only Linux
    start_vm = no
    qemu_force_use_drive_expression = no
    type = blockdev_mirror_pause_and_compare
    virt_test_type = qemu
    source_images = image1
    target_images = mirror1
    backup_options_image1 = sync
    fio_timeout = 300
    fio_options = '--name=stress --filename=/tmp/fio_test_new --ioengine=libaio --rw=randwrite --direct=1 '
    fio_options += '--bs=4K --size=2G --iodepth=128 --numjobs=16 --runtime=${fio_timeout} --time_based --refill_buffers --fallocate=none'
    fio_options += ' --output=/tmp/fio_report.txt &'
    sync = full
    storage_pools = default
    storage_pool = default

    iothreads = iothread0
    image_iothread_image1 = iothread0

    image_format_mirror1 = qcow2
    image_name_mirror1 = mirror1
    rebase_mode = unsafe

    # For local mirror images
    storage_type_default = directory
    enable_iscsi_mirror1 = no
    enable_ceph_mirror1 = no
    enable_gluster_mirror1 = no
    enable_nbd_mirror1 = no
    image_raw_device_mirror1 = no
