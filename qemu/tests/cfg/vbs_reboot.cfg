- vbs_reboot:
    only q35
    only ovmf
    no RHEL
    no Host_RHEL.m6 Host_RHEL.m7 Host_RHEL.m8
    no Host_RHEL.m9.u0 Host_RHEL.m9.u1 Host_RHEL.m9.u2 Host_RHEL.m9.u3 Host_RHEL.m9.u4 Host_RHEL.m9.u5
    type = vbs_basic
    login_timeout = 720
    start_vm = no
    auto_cpu_model = yes
    # support nested virtualization
    HostCpuVendor.intel:
        cpu_model_flags += ',vmx=on'
    HostCpuVendor.amd:
        cpu_model_flags += ',svm=on'
    restore_ovmf_vars = yes
    dg_cmd = 'powershell -ExecutionPolicy Bypass -Command "Get-CimInstance -Namespace root\Microsoft\Windows\DeviceGuard -ClassName Win32_DeviceGuard"'
    check_secure_boot_enabled_cmd = 'powershell -command "Confirm-SecureBootUEFI"'
    dst_path = "C:\\"
    vbs_tool_ps_prefix = powershell -command "Set-ExecutionPolicy Unrestricted -Force; & '
    vbs_tool_ps_suffix = C:\dgreadiness\DG_Readiness_Tool_v3.6.ps1' -{action}"
    vbs_enable_info = 'Enabling Hyper-V and IOMMU successful'
    vbs_disable_info = 'Disabling Hyper-V and IOMMU successful'
    vbs_ready_info = 'HVCI, Credential-Guard, and Config-CI are enabled and running'
    reboot_times = 5
    cdroms += " virtio"
    mem = 30720

    # iommu params
    machine_type_extra_params = "kernel-irqchip=split"
    iommu_device_iotlb = on
    iommu_intremap = on
    iommu_aw_bits = 48
    # vendor-specific iommu device
    HostCpuVendor.intel:
        intel_iommu = yes
        iommu_eim = off
    HostCpuVendor.amd:
        amd_iommu = yes
    # virtio device
    virtio_dev_iommu_platform = on
    virtio_dev_filter = '^(?:(?:virtio-)|(?:vhost-))(?!(?:user)|(?:iommu))'
    virtio_dev_ats = on
