- multi_targets:
    virt_test_type = qemu
    type = multi_targets
    start_vm = no
    kill_vm = yes
    kill_vm_gracefully = yes
    shutdown_cleanly = no
    reboot_method = shell

    # mandatory
    iscsi_target_backstores = bs1 bs2
    # "backend", "emulated_image", "emulated_image_size" are mandatory
    # "attrs" is optional
    iscsi_target_backstore_bs1 = '{"backend": "fileio","emulated_image": "images/basefile001","emulated_image_size": "90M","attrs": "block_size=4096",}'
    iscsi_target_backstore_bs2 = '{"backend": "fileio","emulated_image": "images/basefile002","emulated_image_size": "50M",}'

    t1 = iqn.xxxx:newiscsi01
    t2 = iqn.xxxx:newiscsi02
    # mandatory
    iscsi_targets = t1 t2
    # "portal_ip", "attrs", "binding_basckstores" are optional
    iscsi_target_t1 =  '{"portal_ip": ["127.0.0.1"],'
    iscsi_target_t1 += '"attrs": "authentication=0 demo_mode_write_protect=0 generate_node_acls=1 cache_dynamic_acls=1",'
    iscsi_target_t1 += '"binding_basckstores" : ["bs1"],}'

    iscsi_target_t2 =  '{"portal_ip": ["127.0.0.1"],'
    iscsi_target_t2 += '"binding_basckstores" : ["bs2"],}'
