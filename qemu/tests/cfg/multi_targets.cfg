- multi_targets:
    virt_test_type = qemu
    type = multi_targets
    only Windows
    start_vm = no
    kill_vm = yes
    kill_vm_gracefully = yes
    shutdown_cleanly = no
    reboot_method = shell

    iscsi_targets_luns = '{
        "luns" : {
            "xxxx": {
                "iscsi_backend": "fileio"
                "emulated_image": "images/basefile001",
                "emulated_image_size": "100M",
                "iscsi_lun_attrs": "block_size=4096",
            },
            "xxxx2": {
                "iscsi_backend": "fileio"
                "emulated_image": "images/basefile002",
                "emulated_image_size": "100M",
                "iscsi_lun_attrs": "block_size=4096",
            },
        },
        "targets" : {
            "iqn.xxxx:newiscsi01": {
                "portal_ip": "127.0.0.1",
                "binding_luns" : ["xxxx"],
            },
            "iqn.xxxx:newiscsi02": {
                "portal_ip": "127.0.0.1",
                "binding_luns" : ["xxxx2"],
            },
        },
    }'
