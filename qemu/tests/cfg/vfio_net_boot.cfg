- vfio_net_boot:
    virt_test_type = qemu
    type = vfio_net_boot
    start_vm = no
    nics = ""
    # Special host pci slots to be configured
    # setup_hostdev_slots = 0000:00:00.1
    hostdev_bind_driver = vfio-pci
    vm_hostdev_driver = vfio-pci
    ext_host = www.redhat.com
    variants:
        - single_vm:
            vms = "vm1"
        - multi_vms:
            vms = "vm1 vm2"
            clone_master = yes
            master_images_clone = image1
            remove_image_image1 = yes
    variants:
        - one_nic:
            vm_hostdevs = hostdev1
        - multi_nics:
            vm_hostdevs = hostdev1 hostdev2
    variants:
        - pf_dev:
            hostdev_assignment_type = pf
        - vf_dev:
            hostdev_assignment_type = vf
            hostdev_vf_counts = 4
    variants ip_version:
        - ipv4:
        - ipv6:
    variants:
        - @default:
        - viommu:
            required_qemu= [7.0.0,)
            only x86_64, aarch64
            x86_64:
                only q35
                enable_guest_iommu = yes
            virtio_iommu = yes
        - intel_iommu:
            only q35
            only HostCpuVendor.intel
            machine_type_extra_params = "kernel-irqchip=split"
            intel_iommu = yes
            enable_guest_iommu = yes
    variants:
        - @default:
        - hugepage:
            hugepage = yes
